<!-- app/templates/todo/todo_list.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-t">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Django Docker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f4; }
        .completed { text-decoration: line-through; color: #888; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header">
                        <h1 class="text-center">Mi Lista de Tareas</h1>
                    </div>
                    <div class="card-body">
                        <form action="{% url 'todo_create' %}" method="post" class="mb-3">
                            {% csrf_token %}
                            <div class="input-group">
                                {{ form.title }}
                                <button class="btn btn-primary" type="submit">Añadir</button>
                            </div>
                        </form>
                        <ul class="list-group">
                            {% for todo in todos %}
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <a href="{% url 'todo_update' todo.pk %}" class="text-decoration-none text-dark flex-grow-1">
                                    <span class="{% if todo.completed %}completed{% endif %}">{{ todo.title }}</span>
                                </a>
                                <a href="{% url 'todo_delete' todo.pk %}" class="btn btn-danger btn-sm">Eliminar</a>
                            </li>
                            {% empty %}
                            <li class="list-group-item">No hay tareas pendientes.</li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
